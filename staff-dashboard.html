<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard - Arabian Nights</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f8fafc;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #059669;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
        }

        .header h1 span {
            color: #059669;
            font-size: 1rem;
            margin-left: 10px;
        }

        .staff-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logout-btn {
            background: #059669;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #047857;
            transform: translateY(-2px);
        }

        /* Dashboard Layout */
        .dashboard {
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        .stat-title {
            color: #64748b;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #059669;
            margin-top: 5px;
        }

        /* Section Title */
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 30px 0 20px;
        }

        .section-title h2 {
            font-family: 'Playfair Display', serif;
            color: #0f172a;
        }

        .refresh-btn {
            background: #0f172a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn:hover {
            background: #1e293b;
        }

        /* Orders Grid */
        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .order-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            transition: all 0.3s;
        }

        .order-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f1f5f9;
        }

        .order-number {
            font-weight: 700;
            color: #059669;
            font-size: 1.1rem;
        }

        .order-table {
            background: #f1f5f9;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .order-customer {
            margin-bottom: 10px;
            color: #334155;
        }

        .order-items {
            margin: 15px 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #e2e8f0;
        }

        .item-name {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .item-status-badge {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-pending-item {
            background: #b45309;
        }

        .status-ready-item {
            background: #059669;
        }

        .item-time {
            font-size: 0.8rem;
            color: #64748b;
        }

        .order-total {
            font-weight: 700;
            font-size: 1.2rem;
            color: #059669;
            margin: 10px 0;
            text-align: right;
        }

        .order-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .prepare-btn {
            background: #b45309;
            color: white;
        }

        .prepare-btn:hover {
            background: #92400e;
        }

        .ready-btn {
            background: #059669;
            color: white;
        }

        .ready-btn:hover {
            background: #047857;
        }

        .complete-btn {
            background: #2563eb;
            color: white;
        }

        .complete-btn:hover {
            background: #1d4ed8;
        }

        .action-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .time-input {
            width: 100%;
            padding: 8px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            margin: 10px 0;
        }

        .time-input:focus {
            outline: none;
            border-color: #059669;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            font-weight: 600;
            color: #64748b;
        }

        .tab.active {
            background: #059669;
            color: white;
        }

        /* Empty state */
        .empty-message {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
            font-style: italic;
            background: white;
            border-radius: 15px;
        }

        /* Sound notification */
        .notification-sound {
            display: none;
        }
    </style>
</head>
<body>
    <audio id="notificationSound" class="notification-sound" preload="auto">
        <source src="data:audio/mp3;base64,SUQzBAAAAAABEVRYWFgAAAAtAAADY29tbWVudABCaWdTb3VuZEJhbmsuY29tIC8gTG9uZG9uU291bmRzLmNvbQAAAFRQVVNfCgAAABZURVNUAAAAAgAAAE1BNE1U substance" type="audio/mp3">
    </audio>

    <div class="header">
        <h1>Arabian Nights <span>Staff Dashboard</span></h1>
        <div class="staff-info">
            <span>👨‍🍳 Kitchen Staff</span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">Pending Orders</div>
                <div class="stat-number" id="pendingCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Preparing</div>
                <div class="stat-number" id="preparingCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Ready to Serve</div>
                <div class="stat-number" id="readyCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Completed Today</div>
                <div class="stat-number" id="completedCount">0</div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('pending')" id="tab-pending">Pending Orders</div>
            <div class="tab" onclick="switchTab('preparing')" id="tab-preparing">Preparing</div>
            <div class="tab" onclick="switchTab('ready')" id="tab-ready">Ready to Serve</div>
            <div class="tab" onclick="switchTab('completed')" id="tab-completed">Completed</div>
        </div>

        <div class="section-title">
            <h2 id="currentTabTitle">Pending Orders</h2>
            <button class="refresh-btn" onclick="loadOrders()">🔄 Refresh</button>
        </div>

        <div id="ordersContainer" class="orders-grid">
            <div class="empty-message">Loading orders...</div>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAzg6lEGVS-hcedC7ZhWdz0uq1_vtqTCCA",
            authDomain: "arabian-nights-cca24.firebaseapp.com",
            databaseURL: "https://arabian-nights-cca24-default-rtdb.firebaseio.com",
            projectId: "arabian-nights-cca24",
            storageBucket: "arabian-nights-cca24.firebasestorage.app",
            messagingSenderId: "405951495752",
            appId: "1:405951495752:web:cedcf446717f9359b2e27d",
            measurementId: "G-N6ZC0F2J5V"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Check authentication
        if (sessionStorage.getItem('staffLoggedIn') !== 'true') {
            window.location.href = 'staff-login.html';
        }

        let currentTab = 'pending';
        let previousOrders = {};

        // Load orders on page load
        window.onload = function() {
            loadOrders();
            // Set up real-time listener
            setupRealtimeListener();
        };

        // Set up real-time Firebase listener
        function setupRealtimeListener() {
            database.ref('orders').on('value', (snapshot) => {
                const orders = snapshot.val();
                if (orders) {
                    checkForNewOrders(orders);
                    updateStats(orders);
                    loadOrders(); // Reload current view
                }
            });
        }

        // Check for new orders and notify
        function checkForNewOrders(orders) {
            const now = Date.now();
            const fiveMinutesAgo = now - 5 * 60 * 1000;
            
            Object.values(orders).forEach(order => {
                if (order.status === 'Pending') {
                    const orderTime = new Date(order.timestamp).getTime();
                    if (orderTime > fiveMinutesAgo && !previousOrders[order.id]) {
                        // New order detected
                        playNotification();
                        showBrowserNotification(order);
                    }
                }
            });
            previousOrders = orders;
        }

        // Play notification sound
        function playNotification() {
            const audio = document.getElementById('notificationSound');
            audio.play().catch(e => console.log('Audio play failed:', e));
        }

        // Show browser notification
        function showBrowserNotification(order) {
            if (Notification.permission === 'granted') {
                new Notification('New Order Received!', {
                    body: `Order #${order.orderNumber} - Table ${order.table}`,
                    icon: 'https://images.unsplash.com/photo-1555992336-03a23c8c9a18?w=64'
                });
            } else if (Notification.permission !== 'denied') {
                Notification.requestPermission();
            }
        }

        // Request notification permission
        if (Notification.permission === 'default') {
            Notification.requestPermission();
        }

        // Switch between tabs
        function switchTab(tab) {
            currentTab = tab;
            
            // Update tab styles
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            // Update title
            const titles = {
                pending: 'Pending Orders',
                preparing: 'Orders Being Prepared',
                ready: 'Ready to Serve',
                completed: 'Completed Orders'
            };
            document.getElementById('currentTabTitle').textContent = titles[tab];
            
            // Load orders for this tab
            loadOrders();
        }

        // Load orders based on current tab
        function loadOrders() {
            database.ref('orders').once('value', (snapshot) => {
                const orders = snapshot.val();
                if (!orders) {
                    document.getElementById('ordersContainer').innerHTML = 
                        '<div class="empty-message">No orders found</div>';
                    return;
                }

                const ordersArray = Object.entries(orders).map(([id, order]) => ({ ...order, id }));
                
                // Filter based on current tab
                let filteredOrders = [];
                if (currentTab === 'pending') {
                    filteredOrders = ordersArray.filter(o => o.status === 'Pending');
                } else if (currentTab === 'preparing') {
                    filteredOrders = ordersArray.filter(o => o.status === 'Preparing');
                } else if (currentTab === 'ready') {
                    filteredOrders = ordersArray.filter(o => o.status === 'Ready');
                } else if (currentTab === 'completed') {
                    const today = new Date().toISOString().split('T')[0];
                    filteredOrders = ordersArray.filter(o => 
                        o.status === 'Completed' && o.timestamp && o.timestamp.split('T')[0] === today
                    );
                }

                // Sort by timestamp (newest first for pending, oldest first for preparing)
                if (currentTab === 'pending') {
                    filteredOrders.sort((a, b) => (b.timestamp || '').localeCompare(a.timestamp || ''));
                } else {
                    filteredOrders.sort((a, b) => (a.timestamp || '').localeCompare(b.timestamp || ''));
                }

                renderOrders(filteredOrders);
                updateStats(ordersArray);
            });
        }

        // Render orders in grid
        function renderOrders(orders) {
            if (orders.length === 0) {
                document.getElementById('ordersContainer').innerHTML = 
                    '<div class="empty-message">No orders in this category</div>';
                return;
            }

            let html = '';
            orders.forEach(order => {
                const itemsHtml = renderOrderItems(order);
                const actionsHtml = renderOrderActions(order);
                
                html += `
                    <div class="order-card">
                        <div class="order-header">
                            <span class="order-number">Order #${order.orderNumber || order.id}</span>
                            <span class="order-table">Table ${order.table || 'Takeaway'}</span>
                        </div>
                        <div class="order-customer">
                            👤 ${order.name || 'Customer'}
                        </div>
                        <div class="order-items">
                            ${itemsHtml}
                        </div>
                        <div class="order-total">
                            ${order.total || '₹0'}
                        </div>
                        ${actionsHtml}
                    </div>
                `;
            });

            document.getElementById('ordersContainer').innerHTML = html;
        }

        // Render order items with status
        function renderOrderItems(order) {
            if (!order.items || order.items.length === 0) {
                return '<p>No items</p>';
            }

            let html = '';
            order.items.forEach(item => {
                const itemStatus = order.itemStatus ? order.itemStatus[item.id] : 'pending';
                const statusClass = itemStatus === 'ready' ? 'status-ready-item' : 'status-pending-item';
                const itemTime = item.time && item.time !== "Not Set" ? `⏱️ ${item.time}` : '';
                
                html += `
                    <div class="order-item">
                        <div class="item-name">
                            <span class="item-status-badge ${statusClass}"></span>
                            ${item.name} x${item.quantity}
                        </div>
                        <div>
                            <span class="item-time">${itemTime}</span>
                            <span>₹${item.price * item.quantity}</span>
                        </div>
                    </div>
                `;
            });
            return html;
        }

        // Render action buttons based on order status
        function renderOrderActions(order) {
            if (currentTab === 'completed') {
                return '';
            }

            let actions = '<div class="order-actions">';

            if (order.status === 'Pending') {
                // Show time input for pending orders
                actions += `
                    <input type="number" class="time-input" id="time-${order.id}" 
                           placeholder="Prep time (min)" min="1" max="120">
                    <button class="action-btn prepare-btn" onclick="startPreparing('${order.id}')">
                        Start Preparing
                    </button>
                `;
            } else if (order.status === 'Preparing') {
                // Show item-level ready buttons for preparing orders
                if (order.items && order.items.length > 0) {
                    order.items.forEach(item => {
                        const itemStatus = order.itemStatus ? order.itemStatus[item.id] : 'pending';
                        if (itemStatus !== 'ready') {
                            actions += `
                                <button class="action-btn ready-btn" 
                                        onclick="markItemReady('${order.id}', '${item.id}')">
                                    ✓ ${item.name} Ready
                                </button>
                            `;
                        }
                    });
                }
                
                // Show complete order button if all items are ready
                const allReady = checkAllItemsReady(order);
                if (allReady) {
                    actions += `
                        <button class="action-btn complete-btn" onclick="completeOrder('${order.id}')">
                            ✅ Complete Order
                        </button>
                    `;
                }
            } else if (order.status === 'Ready') {
                actions += `
                    <button class="action-btn complete-btn" onclick="completeOrder('${order.id}')">
                        ✅ Mark as Served
                    </button>
                `;
            }

            actions += '</div>';
            return actions;
        }

        // Check if all items in an order are ready
        function checkAllItemsReady(order) {
            if (!order.items || !order.itemStatus) return false;
            return order.items.every(item => order.itemStatus[item.id] === 'ready');
        }

        // Start preparing an order
        function startPreparing(orderId) {
            const timeInput = document.getElementById(`time-${orderId}`);
            const prepTime = timeInput ? parseInt(timeInput.value) : null;

            if (prepTime && (prepTime < 1 || prepTime > 120)) {
                alert('Please enter a valid preparation time (1-120 minutes)');
                return;
            }

            const updates = {
                status: 'Preparing',
                estimatedTime: prepTime || 15, // Default 15 minutes
                startedAt: new Date().toISOString()
            };

            database.ref('orders/' + orderId).update(updates)
                .then(() => {
                    loadOrders();
                })
                .catch(error => {
                    alert('Error updating order: ' + error.message);
                });
        }

        // Mark individual item as ready
        function markItemReady(orderId, itemId) {
            const orderRef = database.ref('orders/' + orderId);
            
            orderRef.once('value', (snapshot) => {
                const order = snapshot.val();
                if (!order) return;

                // Update item status
                const itemStatus = order.itemStatus || {};
                itemStatus[itemId] = 'ready';

                // Check if all items are now ready
                const allReady = order.items.every(item => itemStatus[item.id] === 'ready');
                
                const updates = {
                    itemStatus: itemStatus,
                    status: allReady ? 'Ready' : 'Preparing'
                };

                if (allReady) {
                    updates.readyAt = new Date().toISOString();
                }

                orderRef.update(updates)
                    .then(() => {
                        loadOrders();
                    })
                    .catch(error => {
                        alert('Error updating item: ' + error.message);
                    });
            });
        }

        // Complete order (mark as served)
        function completeOrder(orderId) {
            if (!confirm('Mark this order as completed/served?')) return;

            database.ref('orders/' + orderId).update({
                status: 'Completed',
                completedAt: new Date().toISOString()
            })
            .then(() => {
                loadOrders();
            })
            .catch(error => {
                alert('Error completing order: ' + error.message);
            });
        }

        // Update statistics
        function updateStats(orders) {
            if (!orders) {
                document.getElementById('pendingCount').textContent = '0';
                document.getElementById('preparingCount').textContent = '0';
                document.getElementById('readyCount').textContent = '0';
                document.getElementById('completedCount').textContent = '0';
                return;
            }

            const ordersArray = Array.isArray(orders) ? orders : Object.values(orders);
            
            const pending = ordersArray.filter(o => o.status === 'Pending').length;
            const preparing = ordersArray.filter(o => o.status === 'Preparing').length;
            const ready = ordersArray.filter(o => o.status === 'Ready').length;
            
            const today = new Date().toISOString().split('T')[0];
            const completed = ordersArray.filter(o => 
                o.status === 'Completed' && o.timestamp && o.timestamp.split('T')[0] === today
            ).length;

            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('preparingCount').textContent = preparing;
            document.getElementById('readyCount').textContent = ready;
            document.getElementById('completedCount').textContent = completed;
        }

        // Logout function
        function logout() {
            sessionStorage.removeItem('staffLoggedIn');
            sessionStorage.removeItem('userRole');
            window.location.href = 'staff-login.html';
        }

        // Auto-refresh every 10 seconds
        setInterval(loadOrders, 10000);
    </script>
</body>
</html>
