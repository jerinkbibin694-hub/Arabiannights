<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Arabian Nights</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1555992336-03a23c8c9a18');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 50px;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-family: 'Playfair Display', serif;
            color: #b45309;
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .logo p {
            color: #666;
            font-size: 0.9rem;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #b45309;
            box-shadow: 0 0 0 3px rgba(180, 83, 9, 0.1);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: #b45309;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            background: #92400e;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(180, 83, 9, 0.3);
        }

        .btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            color: #dc2626;
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            min-height: 20px;
        }

        .links {
            text-align: center;
            margin-top: 20px;
        }

        .links a {
            color: #b45309;
            text-decoration: none;
            font-size: 0.9rem;
            margin: 0 10px;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .password-hint {
            background: #fef3c7;
            border-left: 4px solid #b45309;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #92400e;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>Arabian Nights</h1>
            <p>Admin Portal</p>
        </div>
        <h2>Admin Login</h2>
        
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>

        <button class="btn" onclick="handleAdminLogin()" id="loginBtn">Login to Dashboard</button>
        
        <div class="error-message" id="errorMsg"></div>
        
        <div class="links">
            <a href="staff-login.html">Staff Login</a>
            <a href="home.html">Customer Portal</a>
            <a href="tablebooking.html">Book Table</a>
        </div>
    </div>

    <script>
        // Hardcoded admin credentials (only one admin)
        const ADMIN_USERNAME = "owner";
        const ADMIN_PASSWORD = "8055";

        function handleAdminLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');

            // Validate input
            if (!username || !password) {
                errorMsg.textContent = "Please enter both username and password";
                return;
            }

            // Check credentials
            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                loginBtn.disabled = true;
                loginBtn.textContent = "Logging in...";
                
                // Store admin session
                sessionStorage.setItem('adminLoggedIn', 'true');
                sessionStorage.setItem('userRole', 'admin');
                sessionStorage.setItem('loginTime', new Date().toISOString());
                
                // Redirect to admin dashboard
                setTimeout(() => {
                    window.location.href = 'admin-dashboard.html';
                }, 1000);
            } else {
                errorMsg.textContent = "Invalid username or password";
                
                // Shake animation for wrong credentials
                document.querySelector('.login-container').style.animation = 'shake 0.5s ease';
                setTimeout(() => {
                    document.querySelector('.login-container').style.animation = 'slideUp 0.8s ease';
                }, 500);
            }
        }

        // Add shake animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
                20%, 40%, 60%, 80% { transform: translateX(5px); }
            }
        `;
        document.head.appendChild(style);

        // Check if already logged in
        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            window.location.href = 'admin-dashboard.html';
        }

        // Enter key to login
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleAdminLogin();
            }
        });
    </script>
</body>
</html>
